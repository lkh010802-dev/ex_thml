<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>input element2</title>
    </head>
    <body>
        <!--여러줄 입력-->
        <textarea cols="40" rows="5"></textarea>
        <hr>

        <!-- 콤보박스 용 요소-->
        <select>
            <option value="aa">사과</option>
            <option value="bb">바나나</option>
            <option value="cc">오렌지</option>
        </select>

        <!-- 옵션그룹 활용-->
        <select>
            <optgroup label="중식">
                <option value="a">짜장면</option>
                <option value="b">짬뽕</option>
                <option value="c">볶음밥</option>
            </optgroup>
            <optgroup label="일식">
                <option value="d">스시</option>
                <option value="e">초밥</option>
                <option value="f">우동</option>
            </optgroup>
        </select>
        <hr>

        <fieldset>
            <legend>필드셋의 제목(개인정보)</legend>
            <label>이름: <input type="text" name="name"></label>
            <label>나이: <input type="text" name="age"></label>
        </fieldset>
        <hr>

        <!--파일선택하기-->
        <input type="file" accept="image/png">
        <hr>
        <!--여러개의 파일선택-->
        <input type="file" accept="image/*" multiple>
        <hr>

        <!--비교적 퇴근에 새로 추가된 type들-->
        <form action="">
            <!--날짜 선택관련 타입들-->
            <input type="date"><br>
            <input type="datetime"><br><!--지원안함-->
            <input type="datetime-local">
            <input type="month">
            <input type="week">
            <hr>

            <!--색상 선택창-->
            <input type="color"><br>

            <!--이메일 입력 박스, 모바일에서 키패드의 모양이 달라진다.-->
            <input type="email"><br>

            <!--전화번호, 모바일에서 키패드모양이 달라진다-->
            <input type="tel">

            <!--검색어 입력박스 글씨쓰면 삭제버튼 x이 우측 끝에 표시된다.-->
            <input type="search">

            <!--범위지정 요소-->
            <input type="range" min="0" max="10" step="2" value="4">

            <!--숫자선택 요소-->
            <input type="number" min="210" max="300" step="10" value="230">

            <!-- url입력 타입, 모바일에서 키보드모양이 다르다-->
             <input type="url">

             <hr>
            
            <!--비교적 최근에 새로이 추가된 input의 속성들-->
            <form action="./aaa.php">
                <!--힌트글씨 표시-->
                <input type="text" placeholder="이름을 입력하세요"><br>

                <!--반드시 입력해야하는 요소에 적응하는 속성-->
                <input type="text" required><br>
                <hr>
                <input type="submit">

                <!--글씨는 보이지만 수정 불가-->
                <input type="text" readonly value="sam"><br>

                <!--페이지가 로딩될 때 가장먼저 포커스를 받고 싶다면-->
                <input type="text" autofocus><br>

                <!--최대 입력 글자수 제한-->
                <input type="text" maxlength="5"><br>

                <!--자동 완성 기능-->
                <input type="text" autocomplete list="datas"><br>
                <datalist id="datas">
                    <option value="canada" label="캐나다"></option>
                    <option value="china" label="중국"></option>
                    <option value="korea" label="한국"></option>
                </datalist>


            </form>


        </form>
    </body>
</html>
<!--수행과제
5까지 다 읽고 따라하기 도전과제 같은거-->
