<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>element ex</title>
    </head>
    <body>
        <!-- 1.audio 요소 -->
        <audio src="/day02/audio/old_pop.mp3" controls="controls">오디오 태그가 지원되지 않으묜 보이는 글자</audio>

        <!-- 브라우져 마다 지원가능한 음원의 유형이 다르기에 대응하기 -->
         <audio controls>
            <!-- tyoe은 MIME타입을 지정 -->
            <source src="./audio/old_pop.mp3" type="audio/mp3">
            <source src="./audio/old_pop.ogg" type="audio/ogg">
            <source src="./audio/old_pop.wav" type="audio/wav">
         </audio>
         <!-- 미디어 파일 무료변환 사이트 onlin convert -->

         <hr>
         <!-- 2.비디오 요소 -->
          <video controls>
            <source src="./video/movie.ogv" type="video/ogg">
          </video>

          <video controls width="400" poster="./image/paris.jpg" autoplay muted>
            <source src="./video/trailer.mp4" type="video/mp4">
            <source src="./video/trailer.ogv" type="video/ogg">
            <source src="./video/trailer.webm" type="video/webm">
          </video>

          <!-- 예전에 미디어 파일 전용 요소가 없을 때 사용하던 요소[emved, object] -->
          <embed src="./SQL.pdf" type="application/pdf">
        <hr>
        <object data="./SQL.pdf" type="application/pdf" width="50%" height="300"></object>
        <!-- 현재는 embed, object> iframe으로 사용하는 것을 권장한다. -->

        <!-- 3. iframe[inline frame] : 다른 HTML문서를 내 문서안에서 보여주기-->
         <iframe src="./01_table.html"></iframe>
        <!-- 2.절대 경로 -->
        <iframe src="http://mbca2025aix.dothome.co.kr/index.html" frameborder="0"></iframe>
        <iframe src="https://sr.mbccomputer.co.kr/front/home?gad_source=1&gad_campaignid=21300389686&gbraid=0AAAAA9rzfTcncFaD6M-fnk7SMSPGqYfES&gclid=CjwKCAjw5s_QBhAdEiwADD_gBlwmoRL2bTZXbvBsGQTp39nUJDGCBPvOhLE2MDCDMYvYh3wzf73SwBoC-FAQAvD_BwE" frameborder="0"></iframe>
            
        <hr>

        <!-- 3.하이퍼링크 요소<a>에 의해 열리는 페이지를 iframe안에 열리도록 name속성 지정-->
        <iframe src="" frameborder="2" name="aa" width="300"></iframe>
        <a href="https://www.daum.net" target="aa">다음 포털 사이트</a>
        <!-- iframe이 열지 몸ㅅ하는 사이트도 존재한다.보통 동적으로 화면을 구성하는 사이트들(요즘 많은 사이트가 이렇게 만들고 있다.) -->
        <a href="https://www.naver.com" target="aa"></a>
        <hr>
        <!-- pdf 파일 뷰어도 iframe을 권장 -->
        <iframe src="./SQL.pdf" frameborder="0" width="50%" height="300"></iframe>

        <hr>
        
        <!--4. 화면의 일부 영역을 구분하는 용도의 요소 2개 : div,span-->
        <div style="background-color: blue; border: 2px solid red; padding-left: 10px;">
            <h2>TITLE</h2>
            <p>This is massage.</p>    
            
        </div>

        <!-- div의 블럭요소 특징-->
         <p>
            안녕하세요잉. <div style="color: aqua;">홍길동</div>입니다.
         </p>
         
        <!-- span의 블럭요소 특징-->
         <p>
            안녕하세요잉. <span style="color: aqua;">홍길동</span>입니다.
         </p>
        <!-- div요소는 실제 현업의 프론트앤드 화면 개발할때 가장 많이 사용한다.-->
        <!--웹 페이지를 만들 때 보통 먼저 페이지의 구조를 구성하는 것 부터 시작한다.-->
        <!--이때 div를 사용한다.-->
        <div id="header" style="background-color: yellow;">앱 상단 로고 영역</div>
        <div id="main" style="background-color: aqua;">메인 영역</div>
        <div id="footer" style="background-color: bisque;">앱 하단 바 영역</div>
    </body>
</html>
