<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>input element</title>
    </head>
    <body>
        <!-- 1. input요소의 다양한 type알아보기-->
        
        <!--1. 한줄 입력, 너비를 넘어가면 자동 스크롤-->
        <input type="text" size="40"><br>
        <!--2. 비밀번호 요소-->
        <input type="password"><br>
        <!--3. 라디오 버튼(single choice)-->
        <!--서버에 전송되는 값은 input요소의 value속성값이 전송된다.-->
        <!--두 라디오버튼이 서로 한 그룹으로 인식하도록 name속성이 같아야 한다.-->
        <hr>
        라디오 버튼: <input type="radio" value="aaa" name="rg">aaa
        <input type="radio" value="bbb" name="rg">bbb
        <hr>

        <!--label요소와 함깨 사용하면 글씨를 눌렀을 때 선택이 된다.-->
        <input type="radio" value="male" name="gender" id="rd1">
        <label for="rd1">남성</label>
        <input type="radio" value="female" name="gender" id="rd2" checked>
        <label for="rd2">여성</label>
        <hr>

        <!--4. 체크박스(multiple choice)-->
        <!-- label 요소안에 input요소를 널으면 for속성 부여된 효과를 볼 수 있다.-->
        <label><input type="checkbox" value="apple" name="fruits">사과</label>
        <label><input type="checkbox" value="banana" name="fruits">바나나</label>
        <label><input type="checkbox" value="orange" name="fruits">렌지</label>
        <!-- fruits라는 이름의 식별자(변수)에 선택된 값들(리스트,배열)이 서버로 전송된다.-->
        <hr>

        <!-- 서버 전송을 요철하는 버튼 submit [항상 from 요소와 함께 사용해야 한다.]-->
        <!-- submit 타입의 버튼을 클릭하면 from요소의 action속성에 지정된 서버프로그램이 실행된다.-->
        <form action="./aaa.php">
            <input type="text" name="title">
            <input type="text" name="message">
            <input type="submit" value="가">
            <!--6. 작성내용 모두 삭제(초기화)-->
            <input type="reset" value="다시">

            <!--7. 이미지를 이용여 submit버튼 구현-->
            <input type="image" src="./image/zelda.jpg" width="35">
        </form>
        <hr>

        <!-- 8. input요소의 버튼타입-->
        <input type="button" value="중복체크" onclick="alert('중복된 알림')">

        <!-- 9. button요소-->
        <button onclick="alert('눌렀지')">눌러</button>
        <!-- 버튼요소는 안에 글씨가 아닌 다른요소가 놓여질 수 있다.-->
        <button onclick="alert('시드니')">
            <img src="./image/sydney.jpg" alt="시드니 이미지 버튼" width="50">
        </button>
    </body>
</html>
