<!DOCTYPE html>
<!-- 웹문서 .html의 실행은 웹브라우저로 문서를 보여주는 것-->
<!-- 이를 편하게 해주는 vscode의 확장 프로그램[open in brower]-->
<html>
    <!-- 1. 화면에 보이지 않는 영역(주소줄 영역) 웹문서를 설명하는 내용들 작성-->
    <head>
        <title>
            page 1
        </title>
        <style>
            p{color: cyan;}
        </style>
    </head>


    <!-- 2. 브라우저의 화면 영역 -->
    <body>
        <P> 뭘봐 </P>
    </body>
</html>
