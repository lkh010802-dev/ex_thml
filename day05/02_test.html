<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>css 방문연습</title>
        <!-- 스타일을 적용하는 3가지 방법 -->
        <!-- 1. 외부 스타일 시트(별되의.css문서를 작성하고 연결)-->
        <link rel="stylesheet" href="./02_test.css">

        <!-- 2. 내부 스타일시트 -->
        <style>
            /*이 영역안에서는 css언어의 문법체께를 따른다.*/
            p{font-style: italic; color: red ;}
        </style>
    </head>
    <body>
        <!-- 3.인라인 스타일 -->
        <p style="font-weight: bold; color: blueviolet;">hello</p>
        <p>hello world</p>

    </body>
</html>
