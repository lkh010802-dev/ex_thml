<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>radio</title>
    </head>
    <body>
        <fieldset>
            <legend>상품 선택</legend>

            <h4>주문할 상품을 선택해 주세요.</h4>
            <ul>
                <li><input type="checkbox" name="pood" value="s_3">선물용 3kg</li>
                <li><input type="checkbox" name="pood" value="s_5">선물용 5kg</li>
                <li><input type="checkbox" name="pood" value="p_3">가정용 3kg</li>
                <li><input type="checkbox" name="pood" value="p_5">가정용 5kg</li>
            </ul>

            <h4>포장 선택</h4>
            <ul>
                <li><input type="radio" name="gift" value="yes">선물포장</li>
                <li><input type="radio" name="gift" value="no">선물포장 안함</li>
            </ul>

        </fieldset>

    </body>
</html>
