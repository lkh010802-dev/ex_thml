<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>index.html</title>
    </head>
    <body>
        <h2>HTTP REQUEST TEST</h2>
        <!--from요소: anchor요소처럼 다른 문서를 실행하지만 데이터를 전달할 수 있고, 이동하기위한 별도의 input요소가 필요하다.(백엔드php 프로그램을 실행하고 데이터를 전달하는 요소) -->
        <!-- GET방식: 보낼 데이터를 URL뒤에 ? 후 붙여서 전달하는 방식 -->
         <!-- <form action="./aaa.php" method="get">
            <input type="text" placeholder="제목 입력" name="title">
            <input type="text" placeholder="메세지 입력" name="msg">

            <input type="submit">
         </form> -->
         <hr>
         <!-- POST방식: 데이터를 숨겨서 보내는 방식 -->
          <fieldset>
            <legend>POST method test</legend>

            <form action="./bbb.php" method="post">
                <label for="in1">아이디: </label>
                <input type="text" name="user_id" id="in1">
                <br>

                <label>비밀번호: <input type="password" name="user_pw"></label>
                <br>
                <p>
                    성별:
                    <label><input type="radio" name="gender" value="male">남성</label>
                    <label><input type="radio" name="gender" value="female" checked>여성</label>
                </p>

                <p>
                    당신이 좋아하는 과일을 모두 선택하세요. <br>
                    <label><input type="checkbox" name="fruits[]" value="apple">사과</label>
                    <label><input type="checkbox" name="fruits[]" value="banana">바나나</label>
                    <label><input type="checkbox" name="fruits[]" value="orange">오렌지</label>
                </p>

                <p>
                    메세지: <br>
                    <textarea name="message" cols="40" rows="5"></textarea>
                </p>

                <div>
                    <select name="brand">
                        <optgroup label="자동차 브랜드">
                            <option value="현대">현대</option>
                            <option value="기아" selected>기아</option>
                            <option value="KGM">KGM</option>
                        </optgroup>
                    </select>
                </div>

                <hr>
                <input type="submit" value="서버전송">
                <input type="reset" value="작성 취소">


            </form>

          </fieldset>
    </body>
</html>
