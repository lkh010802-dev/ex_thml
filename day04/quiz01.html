<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>11번 완성 화면</title>

        <style>
            label{
                display: inline-block;
                width: 80px;
            }

            li{
                list-style: none;
                margin-bottom: 10px;
            }

            fieldset{
                width: 350px;
            }
        </style>

    </head>

    <body>

        <h1>예약 정보</h1>

        <fieldset>

            <legend>예약자 정보</legend>

            <form action="quiz01_data.php" method="get">

                <ul>

                    <li>
                        <label for="name">이름</label>

                        <input type="text"
                               id="name"
                               name="name"
                               placeholder="이름을 입력하세요">
                    </li>

                    <li>
                        <label for="phone">전화번호</label>

                        <input type="text"
                               id="phone"
                               name="phone"
                               placeholder="전화번호를 입력하세요">
                    </li>

                    <li>
                        <label for="email">이메일</label>

                        <input type="email"
                               id="email"
                               name="email"
                               placeholder="이메일을 입력하세요">
                    </li>

                </ul>

                <input type="submit" value="예약하기">

            </form>

        </fieldset>

    </body>
</html>
